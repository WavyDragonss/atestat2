<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bibliografie - Rețele Sociale și Adolescenți</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
    <h1>📚 Bibliografie</h1>
    <p>Surse consultate pentru realizarea acestei lucrări</p>
    <a class="inapoi" href="../index.html">← Înapoi la pagina principală</a>
</header>
<main>
    <div class="continut">
        <div class="bloc-text">
            <!--
              CUM ADAUGI UN LINK NOU:
              1. Copiază una dintre liniile <li>...</li> de mai jos.
              2. Înlocuiește textul dintre href="..." cu adresa (URL-ul) sursei tale.
                 Exemplu: href="https://www.exemplu.ro/articol"
              3. Înlocuiește textul dintre <a>...</a> cu titlul sau descrierea sursei.
              4. Salvează fișierul și reîncarcă pagina în browser.
              Notă: lasă spațiile goale ("...") acolo unde vrei să completezi mai târziu.
            -->
            <ul class="detalii">
                <li><strong>Sursa 1:</strong> <a href="https://ro.wikipedia.org/wiki/Transilvania" target="_blank">Transilvania</a></li>
                <li><strong>Sursa 2:</strong> <a href="https://ro.wikipedia.org/wiki/Muntenia" target="_blank">Muntenia și București</a></li>
                <li><strong>Sursa 3:</strong> <a href="https://ro.wikipedia.org/wiki/Maramure%C8%99" target="_blank">Maramureș</a></li>
                <li><strong>Sursa 4:</strong> <a href="https://ro.wikipedia.org/wiki/Carpa%C8%9Bii_Meridionali" target="_blank">Carpații și Valea Prahovei</a></li>
                <li><strong>Sursa 5:</strong> <a href="https://ro.wikipedia.org/wiki/Litoralul_rom%C3%A2nesc_al_M%C4%83rii_Negre" target="_blank">Litoralul Mării Negre</a></li>
                <li><strong>Sursa 6:</strong> <a href="https://ro.wikipedia.org/wiki/Delta_Dun%C4%83rii" target="_blank">Delta Dunării</a></li>
            </ul>
        </div>
    </div>
</main>
</body>
</html>
